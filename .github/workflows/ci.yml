name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run tests
        run: pytest tests/ -q --cov=backend --cov=ai --cov=security --cov=mcp_server --cov-fail-under=65

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate manifest and JavaScript syntax
        run: |
          node -e "JSON.parse(require('fs').readFileSync('frontend/extension/manifest.json', 'utf8'))"
          node --check frontend/extension/background.js
          node --check frontend/extension/content/page_scanner.js
          node --check frontend/extension/content/gmail_scanner.js
          node --check frontend/extension/popup/popup.js
