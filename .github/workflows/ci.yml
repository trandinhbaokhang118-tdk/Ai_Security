name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .
      - name: Run tests
        run: pytest tests/ -q --cov=backend --cov=ai --cov=security --cov=mcp_server --cov-fail-under=65

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate and package Manifest V3 extension
        run: python scripts/package_extension.py
      - uses: actions/upload-artifact@v4
        with:
          name: prewise-armor-extension
          path: artifacts/prewise-armor-extension-*.zip
          if-no-files-found: error

  desktop:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/desktop/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build renderer and Electron runtime
        run: npm run build
      - name: Smoke-test Windows packaging
        run: npm run release:dir

  production-gate:
    needs: [backend, web]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COMPOSE_PROJECT_NAME: aisec-ci
      BACKEND_PORT: "18080"
      POSTGRES_PASSWORD: ci-postgres-password-at-least-32-characters
      API_KEY_PEPPER: ci-api-pepper-value-at-least-32-characters
      API_KEY: ci-api-key-value-at-least-32-characters
      TELEMETRY_SENSOR_PEPPER: ci-telemetry-pepper-at-least-32-characters
    steps:
      - uses: actions/checkout@v4

      - name: Validate production Compose
        run: docker compose -f docker-compose.production.yml config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production backend once
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          load: true
          tags: aisec-ci-backend:latest
          cache-from: type=gha,scope=production-backend
          cache-to: type=gha,mode=min,ignore-error=true,scope=production-backend

      - name: Reuse image for migration service
        run: |
          docker tag aisec-ci-backend:latest aisec-ci-migrate:latest

      - name: Verify PostgreSQL migration upgrade, rollback and upgrade
        run: |
          docker compose -f docker-compose.production.yml up -d --wait postgres
          docker compose -f docker-compose.production.yml run --rm migrate
          docker compose -f docker-compose.production.yml run --rm migrate alembic downgrade base
          docker compose -f docker-compose.production.yml run --rm migrate alembic upgrade head

      - name: Start production message-security stack
        run: docker compose -f docker-compose.production.yml up -d --no-build --wait backend

      - name: Require fail-closed readiness
        run: |
          curl --fail --show-error --retry 12 --retry-delay 5 \
            http://127.0.0.1:18080/v1/ready

      - name: Capture service logs on failure
        if: failure()
        run: docker compose -f docker-compose.production.yml logs --tail=200 backend migrate postgres clamav

      - name: Clean temporary production stack
        if: always()
        run: docker compose -f docker-compose.production.yml down -v --remove-orphans
