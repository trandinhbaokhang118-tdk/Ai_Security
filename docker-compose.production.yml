services:
  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    environment:
      CLAMAV_NO_MILTERD: "true"
      FRESHCLAM_CHECKS: "12"
    volumes:
      - clamav-data:/var/lib/clamav
    networks: [armor-private, armor-egress]
    security_opt: ["no-new-privileges:true"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-armor}
      POSTGRES_USER: ${POSTGRES_USER:-armor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [armor-private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-armor}?sslmode=disable
      DATABASE_REQUIRE_TLS: "false"
      DATABASE_AUTO_CREATE: "false"
      SEED_DEMO_USER: "false"
      API_KEY_PEPPER: ${API_KEY_PEPPER:?Set API_KEY_PEPPER}
      API_KEY: ${API_KEY:?Set API_KEY}
      TELEMETRY_SENSOR_PEPPER: ${TELEMETRY_SENSOR_PEPPER:?Set TELEMETRY_SENSOR_PEPPER}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [armor-private]
    restart: "no"
    security_opt: ["no-new-privileges:true"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-armor}?sslmode=disable
      DATABASE_REQUIRE_TLS: "false"
      DATABASE_AUTO_CREATE: "false"
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      SEED_DEMO_USER: "false"
      API_KEY_PEPPER: ${API_KEY_PEPPER:?Set API_KEY_PEPPER}
      API_KEY: ${API_KEY:?Set API_KEY}
      TELEMETRY_SENSOR_PEPPER: ${TELEMETRY_SENSOR_PEPPER:?Set TELEMETRY_SENSOR_PEPPER}
      MCP_ALLOW_ANONYMOUS: "false"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-["https://prewise.site","https://www.prewise.site"]}
      ADAPTER_REGISTRY_ENABLED: ${ADAPTER_REGISTRY_ENABLED:-true}
      ADAPTER_MANIFEST_PATH: /app/server/adapters/manifest.json
      ADAPTER_BASE_URL: ${ADAPTER_BASE_URL:-}
      ADAPTER_API_KEY: ${ADAPTER_API_KEY:-}
      ADAPTER_TIMEOUT_SECONDS: ${ADAPTER_TIMEOUT_SECONDS:-15}
      ADAPTER_MAX_RISK_CONTRIBUTION: ${ADAPTER_MAX_RISK_CONTRIBUTION:-0.25}
      PHONE_INTELLIGENCE_URL: ${PHONE_INTELLIGENCE_URL:-}
      IPQS_PHONE_API_URL: ${IPQS_PHONE_API_URL:-https://www.ipqualityscore.com/api/json/phone}
      IPQS_PHONE_API_KEY: ${IPQS_PHONE_API_KEY:-}
      PHONE_INTELLIGENCE_TIMEOUT_SECONDS: ${PHONE_INTELLIGENCE_TIMEOUT_SECONDS:-8}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      ATTACHMENT_SCAN_TIMEOUT_SECONDS: ${ATTACHMENT_SCAN_TIMEOUT_SECONDS:-10}
      TESSERACT_LANGUAGES: ${TESSERACT_LANGUAGES:-vie+eng}
      ATTACHMENT_OCR_TIMEOUT_SECONDS: ${ATTACHMENT_OCR_TIMEOUT_SECONDS:-12}
      EMAIL_ATTACHMENT_SANDBOX_ENABLED: ${EMAIL_ATTACHMENT_SANDBOX_ENABLED:-false}
      EMAIL_ATTACHMENT_ACTIVE_SCAN_LIMIT: ${EMAIL_ATTACHMENT_ACTIVE_SCAN_LIMIT:-12}
      EMAIL_OCR_IMAGE_LIMIT: ${EMAIL_OCR_IMAGE_LIMIT:-5}
      EMAIL_SANDBOX_FILE_LIMIT: ${EMAIL_SANDBOX_FILE_LIMIT:-1}
      EMAIL_ATTACHMENT_BUDGET_SECONDS: ${EMAIL_ATTACHMENT_BUDGET_SECONDS:-35}
      EMAIL_ANALYSIS_TIMEOUT_SECONDS: ${EMAIL_ANALYSIS_TIMEOUT_SECONDS:-90}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_REDIRECT_URI: ${GMAIL_OAUTH_REDIRECT_URI:-}
      GMAIL_TOKEN_ENCRYPTION_KEYS: ${GMAIL_TOKEN_ENCRYPTION_KEYS:-}
      GMAIL_WEB_RETURN_URL: ${GMAIL_WEB_RETURN_URL:-https://prewise.site/analyze?gmail=connected}
      GMAIL_API_TIMEOUT_SECONDS: ${GMAIL_API_TIMEOUT_SECONDS:-12}
    volumes:
      - ./server/adapters:/app/server/adapters:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
    networks: [armor-private, armor-egress]
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]

networks:
  armor-private:
    internal: true
  # Backend needs bounded egress for configured reputation APIs; ClamAV needs it
  # for FreshClam. No service port is published on this network.
  armor-egress:

volumes:
  postgres-data:
  clamav-data:
