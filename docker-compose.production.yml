services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-armor}
      POSTGRES_USER: ${POSTGRES_USER:-armor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [armor-private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt: ["no-new-privileges:true"]

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-armor}?sslmode=disable
      DATABASE_REQUIRE_TLS: "false"
      DATABASE_AUTO_CREATE: "false"
      SEED_DEMO_USER: "false"
      API_KEY_PEPPER: ${API_KEY_PEPPER:?Set API_KEY_PEPPER}
      API_KEY: ${API_KEY:?Set API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [armor-private]
    restart: "no"
    security_opt: ["no-new-privileges:true"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-armor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-armor}?sslmode=disable
      DATABASE_REQUIRE_TLS: "false"
      DATABASE_AUTO_CREATE: "false"
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      SEED_DEMO_USER: "false"
      API_KEY_PEPPER: ${API_KEY_PEPPER:?Set API_KEY_PEPPER}
      API_KEY: ${API_KEY:?Set API_KEY}
      MCP_ALLOW_ANONYMOUS: "false"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-["https://prewise.site","https://www.prewise.site"]}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [armor-private]
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]

networks:
  armor-private:
    internal: true

volumes:
  postgres-data:
