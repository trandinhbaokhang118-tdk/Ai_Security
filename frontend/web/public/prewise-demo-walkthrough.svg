<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Prewise local product walkthrough</title>
  <desc id="desc">An animated walkthrough showing a suspicious URL being analyzed and blocked.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#05090e"/><stop offset="1" stop-color="#10211f"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="540" rx="18" fill="url(#bg)"/>
  <rect x="34" y="34" width="892" height="472" rx="12" fill="#080e13" stroke="#29413f"/>
  <circle cx="62" cy="61" r="6" fill="#ff6b78"/><circle cx="82" cy="61" r="6" fill="#e7c45d"/><circle cx="102" cy="61" r="6" fill="#58d5b0"/>
  <text x="132" y="67" fill="#8ba4a1" font-family="monospace" font-size="14">PREWISE / LOCAL WALKTHROUGH</text>
  <text x="62" y="124" fill="#5fe6d5" font-family="monospace" font-size="13">01 / SIGNAL INPUT</text>
  <rect x="62" y="145" width="836" height="64" rx="7" fill="#05090d" stroke="#31534f"/>
  <text x="83" y="184" fill="#d5e5e3" font-family="monospace" font-size="18">secure-paypaI-support.example/account/verify</text>
  <rect x="748" y="157" width="136" height="40" rx="5" fill="#54e2d0"/>
  <text x="773" y="183" fill="#041311" font-family="monospace" font-size="13" font-weight="bold">ANALYZE →</text>
  <g font-family="monospace" font-size="12">
    <circle cx="82" cy="263" r="7" fill="#55e5d2" filter="url(#glow)"><animate attributeName="opacity" values=".25;1;.25" dur="1.8s" repeatCount="indefinite"/></circle>
    <text x="102" y="268" fill="#9bb1ae">Normalize URL</text>
    <circle cx="290" cy="263" r="7" fill="#55e5d2" filter="url(#glow)"><animate attributeName="opacity" values=".25;.25;1;.25" keyTimes="0;.25;.55;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <text x="310" y="268" fill="#9bb1ae">Detect impersonation</text>
    <circle cx="563" cy="263" r="7" fill="#55e5d2" filter="url(#glow)"><animate attributeName="opacity" values=".25;.25;.25;1;.25" keyTimes="0;.4;.55;.78;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <text x="583" y="268" fill="#9bb1ae">Correlate evidence</text>
  </g>
  <path d="M89 263h188M297 263h253" stroke="#29413f" stroke-width="2"/>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.55;.7;1" dur="4s" repeatCount="indefinite"/>
    <rect x="62" y="307" width="836" height="155" rx="8" fill="#101817" stroke="#406b65"/>
    <text x="88" y="340" fill="#65dece" font-family="monospace" font-size="12">ANALYSIS COMPLETE</text>
    <text x="88" y="407" fill="#fff" font-family="sans-serif" font-size="54" font-weight="bold">87</text>
    <text x="159" y="407" fill="#819793" font-family="monospace" font-size="14">/ 100 RISK</text>
    <rect x="342" y="340" width="175" height="75" rx="6" fill="#3d161a" stroke="#a94f58"/>
    <text x="372" y="369" fill="#e8939b" font-family="monospace" font-size="11">DECISION</text>
    <text x="372" y="399" fill="#ff7180" font-family="sans-serif" font-size="26" font-weight="bold">BLOCK</text>
    <text x="563" y="351" fill="#a9bcb9" font-family="monospace" font-size="13">✓ HOMOGLYPH DOMAIN</text>
    <text x="563" y="382" fill="#a9bcb9" font-family="monospace" font-size="13">✓ FALSE URGENCY</text>
    <text x="563" y="413" fill="#a9bcb9" font-family="monospace" font-size="13">✓ CREDENTIAL REQUEST</text>
  </g>
  <rect x="62" y="480" width="836" height="3" fill="#1f3431"/>
  <rect x="62" y="480" width="0" height="3" fill="#62e4d3"><animate attributeName="width" values="0;836" dur="4s" repeatCount="indefinite"/></rect>
</svg>
